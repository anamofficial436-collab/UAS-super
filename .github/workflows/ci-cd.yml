name: CI/CD Pipeline — UAS Server Administration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Deteksi perubahan folder secara mandiri
  # ─────────────────────────────────────────────
  changes:
    name: 🔍 Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      web_statis:   ${{ steps.filter.outputs.web_statis }}
      web_dinamis:  ${{ steps.filter.outputs.web_dinamis }}
      infra:        ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run paths-filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web_statis:
              - 'web-statis/**'
            web_dinamis:
              - 'web-dinamis/**'
            infra:
              - 'docker-compose.yml'
              - '.env.example'
              - '.github/workflows/**'

  # ─────────────────────────────────────────────
  # JOB 2: Build & Push — web-statis (Nginx)
  # ─────────────────────────────────────────────
  build_web_statis:
    name: 🏗️ Build web-statis (Nginx)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web_statis == 'true' || needs.changes.outputs.infra == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push web-statis
        uses: docker/build-push-action@v5
        with:
          context: ./web-statis
          file: ./web-statis/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/uas-web-statis:latest
            ${{ env.DOCKERHUB_USERNAME }}/uas-web-statis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: Build & Push — web-dinamis (PHP)
  # ─────────────────────────────────────────────
  build_web_dinamis:
    name: 🏗️ Build web-dinamis (PHP 8.2)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web_dinamis == 'true' || needs.changes.outputs.infra == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push web-dinamis
        uses: docker/build-push-action@v5
        with:
          context: ./web-dinamis
          file: ./web-dinamis/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/uas-web-dinamis:latest
            ${{ env.DOCKERHUB_USERNAME }}/uas-web-dinamis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 4: Deploy ke AWS EC2 via SSH (Zero-Touch)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [changes, build_web_statis, build_web_dinamis]
    # Jalankan jika salah satu build selesai (atau skip jika tidak ada perubahan)
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.build_web_statis.result == 'success' || needs.build_web_statis.result == 'skipped') &&
      (needs.build_web_dinamis.result == 'success' || needs.build_web_dinamis.result == 'skipped') &&
      (needs.changes.outputs.web_statis == 'true' || needs.changes.outputs.web_dinamis == 'true' || needs.changes.outputs.infra == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          port:        22
          # Timeout & retry agar koneksi lebih stabil
          timeout:     60s
          command_timeout: 20m
          script: |
            set -e  # Hentikan script jika ada error

            echo "════════════════════════════════════════"
            echo "  🚀 Starting Zero-Touch Deployment"
            echo "  Commit: ${{ github.sha }}"
            echo "  Timestamp: $(date -u)"
            echo "════════════════════════════════════════"

            # ── 1. Navigasi ke direktori proyek ──
            APP_DIR="$HOME/uas-project"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # ── 2. Sinkronisasi kode terbaru ──
            if [ ! -d ".git" ]; then
              echo "[INFO] Fresh clone..."
              git clone https://github.com/${{ github.repository }} .
            else
              echo "[INFO] Pulling latest changes..."
              git fetch --all
              git reset --hard origin/main
              git pull origin main
            fi

            # ── 3. Setup file environment ──
            if [ ! -f ".env" ]; then
              echo "[INFO] Creating .env from .env.example..."
              cp .env.example .env
              # Ganti nilai default dengan secrets dari environment EC2
              # (Sesuaikan manual di server atau inject via secret manager)
            fi

            # ── 4. Login ke Docker Hub ──
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # ── 5. Pull image terbaru ──
            echo "[INFO] Pulling latest Docker images..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/uas-web-statis:latest  || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/uas-web-dinamis:latest || true

            # ── 6. ANTI-CONFLICT: Paksa hapus kontainer lama ──
            echo "[INFO] Removing old containers (anti-conflict)..."
            sudo docker rm -f app_web_statis  2>/dev/null || true
            sudo docker rm -f app_web_dinamis 2>/dev/null || true
            sudo docker rm -f mariadb_db      2>/dev/null || true

            # Turunkan semua stack lama + bersihkan orphan
            docker compose down --remove-orphans 2>/dev/null || true

            # ── 7. Jalankan stack baru ──
            echo "[INFO] Starting new stack..."
            docker compose up -d --pull always --force-recreate

            # ── 8. Verifikasi deployment ──
            echo "[INFO] Waiting for containers to be healthy..."
            sleep 10

            echo ""
            echo "════════════ Container Status ════════════"
            docker compose ps
            echo ""

            # Health check sederhana
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80)
            PHP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)

            echo "[CHECK] web-statis  (port 80)  → HTTP $HTTP_STATUS"
            echo "[CHECK] web-dinamis (port 3000) → HTTP $PHP_STATUS"

            if [ "$HTTP_STATUS" = "200" ] && [ "$PHP_STATUS" = "200" ]; then
              echo ""
              echo "✅ Deployment SUCCESS — All services are UP"
            else
              echo ""
              echo "⚠️  Deployment WARNING — Check service logs:"
              docker compose logs --tail=50
            fi

            echo "════════════════════════════════════════"
            echo "  ✅ Zero-Touch Deployment Complete"
            echo "════════════════════════════════════════"
